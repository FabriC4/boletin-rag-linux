server.port=8080

# Token de seguridad que deben mandar los clientes externos (header: Authorization: Bearer <token>)
# IMPORTANTE: en producción, no lo dejes hardcodeado en este archivo -- pasalo por variable de
# entorno: export BOLETINES_API_TOKEN=algo-largo-y-random-generado-con-un-uuid-o-similar
boletines.api.token=${BOLETINES_API_TOKEN:cambiar-este-token-en-produccion}

# URL del servicio Python (FastAPI) interno, corriendo en la misma máquina
boletines.rag.base-url=${BOLETINES_RAG_URL:http://127.0.0.1:8000}

# Timeout generoso: un modelo de 7B en CPU puede tardar bastante en responder
boletines.rag.timeout-seconds=180
